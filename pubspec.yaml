name: sos_help_listener
description: "SOS listener app that auto-calls a primary emergency contact on HELP x3."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.7.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_riverpod: ^2.6.1
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2
  geolocator: ^14.0.2
  google_fonts: ^6.3.2
  flutter_background_service: ^5.0.7
  speech_to_text: ^6.6.2

dev_dependencies:
  http: ^1.2.0
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/branding/

flutter_launcher_icons:
  android: true
  ios: true
  web:
    generate: true
  windows:
    generate: true
  macos:
    generate: true
  image_path: assets/branding/proteqher_logo.png
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: assets/branding/proteqher_logo.png